# ─────────────────────────────────────────────
# Parâmetros globais do sistema seguidor
# Edite aqui sem precisar mexer nos .py
# ─────────────────────────────────────────────

color_detector:
  # Cor alvo em HSV — use tools/hsv_calibrator.py para encontrar seus valores
  hsv_lower:  [0,   120, 70]
  hsv_upper:  [15,  255, 255]
  hsv_lower2: [170, 120, 70]   # segunda faixa para laranja (wrap do hue)
  hsv_upper2: [180, 255, 255]
  min_contour_area: 500         # área mínima em px² para considerar detecção
  camera_hfov: 60.0             # campo de visão horizontal da Astra (graus)

lidar_reader:
  valid_angle_range_deg: 60.0   # faixa frontal considerada válida (±60°)
  min_valid_dist: 0.15          # metros — abaixo disso é ruído
  max_valid_dist: 5.0           # metros — acima disso descarta

sensor_fusion:
  target_distance: 1.0          # distância desejada do alvo em metros
  target_timeout:  1.0          # segundos sem alvo antes de parar
  alpha_angle: 0.4              # suavização do ângulo (0=lento, 1=sem filtro)
  alpha_dist:  0.6              # suavização da distância

follower_controller:
  kp_angular: 0.6               # ganho proporcional de rotação
  kp_linear:  0.4               # ganho proporcional de avanço
  max_linear_vel:  0.3          # m/s — limite de segurança
  max_angular_vel: 0.8          # rad/s — limite de segurança
  deadzone_angle: 0.05          # erro angular mínimo para agir (normalizado)
  deadzone_dist:  0.10          # erro de distância mínimo para agir (metros)
  safety_timeout: 0.5           # segundos sem /target/pose antes do safety stop
  cmd_vel_topic: "/cmd_vel"     # confirme com rostopic list no Limo